name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feature/refactor-llm-optimizations ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r nueveonce/requirements.txt
      - name: Run tests
        run: |
          python -m pytest -q
      - name: Run flake8 (optional)
        run: |
          pip install flake8
          flake8 --max-line-length=120
